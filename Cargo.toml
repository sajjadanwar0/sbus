[package]
name = "sbus"
version = "0.1.0"
edition = "2021"
authors = ["Sajjad Khan <sajjadanwar0@gmail.com>"]
description = "Semantic Bus: Transactional middleware for multi-agent LLM systems"
license = "MIT"
repository = "https://github.com/sajjadanwar0/sbus"
homepage = "https://github.com/sajjadanwar0/sbus"
readme = "README.md"
keywords = ["multi-agent", "llm", "middleware", "concurrency", "agentic-ai"]
categories = ["concurrency", "network-programming", "web-programming::http-server"]

[[bin]]
name = "sbus-server"
path = "src/main.rs"

[dependencies]
tokio              = { version = "1.44",  features = ["full"] }
axum               = { version = "0.8.4", features = ["macros"] }
serde              = { version = "1.0",   features = ["derive"] }
serde_json         = "1.0"
sha2               = "0.11.0"
hex                = "0.4"
chrono             = { version = "0.4.40", features = ["serde"] }
tracing            = "0.1"
tracing-subscriber = { version = "0.3",   features = ["env-filter"] }
tower-http         = { version = "0.6.2", features = ["cors", "trace"] }
thiserror          = "2.0"

[dev-dependencies]
criterion          = { version = "0.8.2", features = ["async_tokio"] }

[profile.release]
opt-level     = 3
lto           = true
codegen-units = 1